<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Emergency fund runway graphic for 2026</title>
  <desc id="desc">A financial dashboard illustration comparing 3, 6, and 9 month emergency fund buffers with inflation and safe yield markers.</desc>
  <defs>
    <linearGradient id="bg" x1="90" y1="60" x2="1110" y2="570" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F" />
      <stop offset="0.6" stop-color="#0F172A" />
      <stop offset="1" stop-color="#0F766E" />
    </linearGradient>
    <linearGradient id="accent" x1="170" y1="150" x2="990" y2="490" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399" />
      <stop offset="1" stop-color="#22D3EE" />
    </linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FB7185" />
      <stop offset="1" stop-color="#F97316" />
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" />
    </filter>
  </defs>
  <rect width="1200" height="630" rx="40" fill="url(#bg)" />
  <circle cx="980" cy="120" r="120" fill="#14B8A6" fill-opacity="0.18" filter="url(#blur)" />
  <circle cx="220" cy="520" r="140" fill="#60A5FA" fill-opacity="0.12" filter="url(#blur)" />
  <rect x="72" y="72" width="1056" height="486" rx="32" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.12" />
  <text x="108" y="132" fill="#E2E8F0" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="3">COSTSMART</text>
  <text x="108" y="188" fill="white" font-size="48" font-family="Arial, Helvetica, sans-serif" font-weight="800">2026 Emergency Fund Runway</text>
  <text x="108" y="228" fill="#CBD5E1" font-size="22" font-family="Arial, Helvetica, sans-serif">3 months is the floor, 6 is the default, 9+ is for volatile income</text>

  <rect x="108" y="272" width="280" height="212" rx="24" fill="#0B1220" fill-opacity="0.72" stroke="white" stroke-opacity="0.08" />
  <text x="136" y="312" fill="#94A3B8" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="2">CURRENT CONTEXT</text>
  <text x="136" y="356" fill="white" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="800">3.93%</text>
  <text x="220" y="356" fill="#CBD5E1" font-size="18" font-family="Arial, Helvetica, sans-serif">CPI inflation</text>
  <text x="136" y="394" fill="white" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="800">5.5%</text>
  <text x="202" y="394" fill="#CBD5E1" font-size="18" font-family="Arial, Helvetica, sans-serif">unemployment</text>
  <text x="136" y="432" fill="white" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="800">4.0% to 8.2%</text>
  <text x="136" y="460" fill="#CBD5E1" font-size="18" font-family="Arial, Helvetica, sans-serif">current safe-yield ladder</text>

  <rect x="420" y="272" width="596" height="212" rx="24" fill="#0B1220" fill-opacity="0.72" stroke="white" stroke-opacity="0.08" />
  <text x="448" y="312" fill="#94A3B8" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="2">BUFFER SIZE</text>

  <rect x="448" y="344" width="140" height="112" rx="18" fill="#1E293B" />
  <rect x="448" y="344" width="140" height="112" rx="18" fill="#F59E0B" fill-opacity="0.22" />
  <text x="470" y="386" fill="white" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="800">3</text>
  <text x="500" y="386" fill="#CBD5E1" font-size="18" font-family="Arial, Helvetica, sans-serif">months</text>

  <rect x="612" y="328" width="140" height="128" rx="18" fill="#1E293B" />
  <rect x="612" y="328" width="140" height="128" rx="18" fill="url(#accent)" fill-opacity="0.28" />
  <text x="634" y="378" fill="white" font-size="40" font-family="Arial, Helvetica, sans-serif" font-weight="800">6</text>
  <text x="670" y="378" fill="#CBD5E1" font-size="18" font-family="Arial, Helvetica, sans-serif">months</text>

  <rect x="776" y="312" width="140" height="144" rx="18" fill="#1E293B" />
  <rect x="776" y="312" width="140" height="144" rx="18" fill="url(#rose)" fill-opacity="0.22" />
  <text x="798" y="368" fill="white" font-size="40" font-family="Arial, Helvetica, sans-serif" font-weight="800">9+</text>
  <text x="836" y="368" fill="#CBD5E1" font-size="18" font-family="Arial, Helvetica, sans-serif">months</text>

  <path d="M448 494H916" stroke="#334155" stroke-width="2" />
  <text x="448" y="522" fill="#94A3B8" font-size="16" font-family="Arial, Helvetica, sans-serif">keep this money liquid, boring, and ready</text>
</svg>
