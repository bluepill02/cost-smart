name: Deploy to Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: ${{ github.event_name == 'push' && 'Production Deploy' || 'Preview Deploy' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment & project settings
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ]; then
            vercel pull --yes --environment=${{ github.event_name == 'push' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}
          else
            echo "VERCEL_TOKEN is not set, skipping Vercel pull"
          fi

      - name: Build project artifacts
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ]; then
            vercel build ${{ github.event_name == 'push' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
          else
            echo "VERCEL_TOKEN is not set, running fallback build"
            npm run build
          fi

      - name: Deploy to Vercel (production)
        if: github.event_name == 'push'
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ]; then
            vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
          else
            echo "VERCEL_TOKEN is not set, skipping Vercel deploy"
          fi

      - name: Deploy to Vercel (preview) and comment on PR
        if: github.event_name == 'pull_request'
        id: preview-deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ]; then
            DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
            echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_OUTPUT
          else
            echo "VERCEL_TOKEN is not set, skipping Vercel preview deploy"
            echo "DEPLOY_URL=skipped" >> $GITHUB_OUTPUT
          fi

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const deployUrl = '${{ steps.preview-deploy.outputs.DEPLOY_URL }}';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('🚀 Vercel Preview Deployment')
            );
            const body = `🚀 **Vercel Preview Deployment**\n\n| Name | Link |\n|------|------|\n| 🔍 Preview | ${deployUrl} |\n| 🔨 Commit | [${context.sha.substring(0, 7)}](${context.payload.repository.html_url}/commit/${context.sha}) |`;
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
